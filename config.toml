baseURL = "https://jlarkstories.com/"
languageCode = "en-us"
title = "JLarkStories"
paginate = 24

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  artist = "artists"
  rating = "rating"

# Navigation menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 2

[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 3

[[menu.main]]
  name = "My Art"
  url = "/blog/art/"
  weight = 4

[[menu.main]]
  name = "Guest Art"
  url = "/blog/guest-art/"
  weight = 5

[[menu.main]]
  name = "News"
  url = "/blog/news/"
  weight = 6

[[menu.main]]
  name = "Fursuiting"
  url = "/blog/fursuiting/"
  weight = 7

[[menu.main]]
  name = "Reviews"
  url = "/blog/reviews/"
  weight = 8

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 9

# Site parameters
[params]
  description = "Art, stories, and creative musings by J. Lark"
  author = "J. Lark"
  logo = "/images/logo.png"
  bio = "Digital storyteller. Artist. Comic creator. Fursuiter. Devoted family bird."
  taglines = [
    "Digital storyteller.",
    "Furry artist.",
    "Comic creator.",
    "Fursuiter.",
    "Devoted family bird.",
  ]

  [params.social]
    bluesky = "https://bsky.app/profile/jlarkstories.bsky.social"
    patreon = "https://www.patreon.com/jlarkstories"
    youtube = "https://www.youtube.com/@jlarkstories"
    furaffinity = "https://www.furaffinity.net/user/jlarkstories"
    telegram = "https://t.me/jlarkstories"
    furtrack = "https://www.furtrack.com/user/inejwstine/fursuiting"

# RSS output
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
