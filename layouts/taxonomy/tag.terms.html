{{ define "main" }}
<section class="page-header">
  <h1>Tags</h1>
  <p class="page-description">Browse posts by tag.</p>
</section>
<div class="taxonomy-terms">
  {{ range .Pages.ByTitle }}
    <a href="{{ .Permalink }}" class="taxonomy-term">
      {{ .Title }}
      <span class="taxonomy-term-count">{{ len .Pages }}</span>
    </a>
  {{ end }}
</div>
{{ end }}
