{{ define "main" }}
<section class="page-header">
  <h1>Category: {{ .Title }}</h1>
  <p class="page-description">All posts in the "{{ .Title }}" category.</p>
</section>
<section class="post-list">
  {{ range .Pages.ByDate.Reverse }}
    {{ partial "post-card.html" . }}
  {{ end }}
</section>
{{ partial "pagination.html" . }}
{{ end }}
