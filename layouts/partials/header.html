<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">
      {{ if not .IsHome }}
        <img src="/images/logo_header.png" data-theme-logo="logo_header" alt="{{ .Site.Title }}">
      {{ end }}
    </a>
    <div class="search-wrapper">
      <input type="text" class="search-input" placeholder="Search..." aria-label="Search posts">
      <div class="search-results" aria-live="polite"></div>
    </div>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span class="hamburger"></span>
    </button>
    <nav class="nav-menu">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
