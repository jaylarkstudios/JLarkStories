{{ with .Site.Data.gallery.posts }}
<section class="gallery-section">
  <h2 class="section-heading">A Few Favorites</h2>
  <div class="gallery-carousel">
    <div class="carousel-track" style="animation-duration: {{ mul (len .) 5 }}s" data-slide-count="{{ len . }}" data-seconds-per-slide="5">
      {{ range . }}
        {{ $page := $.Site.GetPage . }}
        {{ with $page }}
        <div class="carousel-slide" data-tags="{{ with .Params.tags }}{{ delimit . "," }}{{ end }}">
          <a href="{{ .Permalink }}">
            <img src="{{ .Params.thumbnail }}" alt="{{ .Title }}" loading="lazy">
          </a>
        </div>
        {{ end }}
      {{ end }}
      {{ range . }}
        {{ $page := $.Site.GetPage . }}
        {{ with $page }}
        <div class="carousel-slide" data-tags="{{ with .Params.tags }}{{ delimit . "," }}{{ end }}">
          <a href="{{ .Permalink }}">
            <img src="{{ .Params.thumbnail }}" alt="{{ .Title }}" loading="lazy">
          </a>
        </div>
        {{ end }}
      {{ end }}
    </div>
  </div>
</section>
{{ else }}
<!-- Gallery: Add posts to data/gallery.toml to enable the carousel -->
{{ end }}
