{{ define "main" }}
<section class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
</section>
<section class="post-list">
  {{ $pages := .RegularPagesRecursive.ByDate.Reverse }}
  {{ range $pages }}
    {{ partial "post-card.html" . }}
  {{ end }}
</section>
{{ partial "pagination.html" . }}
{{ end }}
